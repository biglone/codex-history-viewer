<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codex History Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="sync-panel.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="url(#logoGrad)"/>
            <path d="M8 14C8 10.686 10.686 8 14 8s6 2.686 6 6-2.686 6-6 6" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <circle cx="14" cy="14" r="2" fill="white"/>
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28">
                <stop stop-color="#6366F1"/>
                <stop offset="1" stop-color="#8B5CF6"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="logo-text">Codex Viewer</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" id="nav-all" onclick="switchView('all')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.8"/>
            <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.8"/>
            <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.8"/>
            <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.8"/>
          </svg>
          全部会话
          <span class="nav-badge" id="total-count">...</span>
        </button>
        <button class="nav-item" id="nav-projects" onclick="switchView('projects')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 4a2 2 0 012-2h3l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V4z" fill="currentColor" opacity="0.8"/>
          </svg>
          按项目浏览
        </button>
        <button class="nav-item" id="nav-search" onclick="switchView('search')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5" opacity="0.8"/>
            <path d="M10 10l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
          </svg>
          全局搜索
        </button>
        <button class="nav-item" id="nav-sync" onclick="openSyncPanel()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M13.5 2.5v3.5H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
            <path d="M2.5 13.5V10H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
            <path d="M13.5 6A6 6 0 0 0 4.1 3.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
            <path d="M2.5 10a6 6 0 0 0 9.4 2.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
          </svg>
          云端同步
          <span class="nav-badge sync-badge" id="sync-badge" style="display:none"></span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="storage-info">
          <div class="storage-dot"></div>
          <span id="storage-path">~/.codex</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <!-- Top Bar -->
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="page-title" id="page-title">全部会话</h1>

          <!-- 局部过滤栏：在会话列表页显示 -->
          <div class="local-filter-bar" id="local-filter-bar">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
              <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M10 10l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input type="text" id="local-filter-input" placeholder="过滤当前页..." autocomplete="off" />
            <span class="filter-count" id="filter-count"></span>
            <button class="filter-clear" id="filter-clear" onclick="clearLocalFilter()" style="display:none">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M9 3L3 9M3 3l6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>

          <!-- 全局搜索栏 -->
          <div class="search-bar-wrap" id="search-bar" style="display:none">
            <!-- 主搜索行 -->
            <div class="search-main-row">
              <svg class="search-icon" width="15" height="15" viewBox="0 0 16 16" fill="none">
                <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                <path d="M10 10l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              <input type="text" id="search-input" placeholder="全局搜索内容..." autocomplete="off" />
              <button class="search-mode-toggle" id="search-mode-toggle" onclick="toggleAdvancedSearch()" title="条件搜索">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                  <path d="M2 4h12M4 8h8M6 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span id="search-mode-label">条件</span>
              </button>
              <kbd class="search-hint">Enter</kbd>
            </div>
            <!-- 高级条件行（默认隐藏） -->
            <div class="search-advanced-row" id="search-advanced-row" style="display:none">
              <div class="search-scope-tabs" id="search-scope-tabs">
                <button class="scope-tab active" data-scope="all" onclick="setSearchScope('all')">全部</button>
                <button class="scope-tab" data-scope="user" onclick="setSearchScope('user')">仅用户提问</button>
                <button class="scope-tab" data-scope="assistant" onclick="setSearchScope('assistant')">仅 Codex 回答</button>
                <button class="scope-tab" data-scope="pair" onclick="setSearchScope('pair')">提问+回答配对</button>
              </div>
              <!-- pair 模式：两个输入框 -->
              <div class="search-pair-row" id="search-pair-row" style="display:none">
                <div class="pair-input-wrap">
                  <span class="pair-label user-label">问</span>
                  <input type="text" id="pair-user-input" placeholder="用户提问关键词..." autocomplete="off"/>
                </div>
                <div class="pair-input-wrap">
                  <span class="pair-label assistant-label">答</span>
                  <input type="text" id="pair-assistant-input" placeholder="Codex 回答关键词..." autocomplete="off"/>
                </div>
                <button class="pair-search-btn" onclick="doPairSearch()">搜索配对</button>
              </div>
            </div>
          </div>
        </div>
        <div class="topbar-right">
          <button class="text-icon-btn" id="refresh-btn" onclick="refresh()" title="刷新数据">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
              <path d="M14 2v3.5h-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12.5 5.5A6 6 0 1 0 13.9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span>刷新</span>
          </button>
          <button class="icon-btn" id="theme-btn" onclick="openThemePicker()" title="切换主题">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="8" r="3" fill="currentColor"/>
              <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.42 1.42M11.53 11.53l1.42 1.42M3.05 12.95l1.42-1.42M11.53 4.47l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Content Area -->
      <div class="content" id="content">
        <div class="loading-state" id="loading">
          <div class="spinner"></div>
          <p>加载中...</p>
        </div>
      </div>

      <!-- Pagination -->
      <footer class="pagination" id="pagination" style="display:none">
        <button class="page-btn" id="prev-btn" onclick="prevPage()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          上一页
        </button>
        <span class="page-info" id="page-info">第 1 页</span>
        <button class="page-btn" id="next-btn" onclick="nextPage()">
          下一页
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </footer>
    </main>

    <!-- Detail Panel -->
    <div class="detail-overlay" id="detail-overlay" onclick="closeDetail()"></div>
    <div class="detail-panel" id="detail-panel">
      <div class="detail-header">
        <div class="detail-title-wrap">
          <h2 class="detail-title" id="detail-title">会话详情</h2>
          <div class="detail-meta" id="detail-meta"></div>
        </div>
        <div class="detail-header-actions">
          <button class="icon-btn" id="detail-fullscreen-btn" onclick="toggleDetailFullscreen()" title="全屏查看" data-fullscreen="0">
            <!-- expand icon -->
            <svg class="icon-expand" width="15" height="15" viewBox="0 0 16 16" fill="none">
              <path d="M2 6V2h4M10 2h4v4M14 10v4h-4M6 14H2v-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <!-- shrink icon -->
            <svg class="icon-shrink" width="15" height="15" viewBox="0 0 16 16" fill="none" style="display:none">
              <path d="M6 2v4H2M10 2v4h4M2 10h4v4M14 10h-4v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="icon-btn close-btn" onclick="closeDetail()">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- 会话内搜索栏 -->
      <div class="detail-search-bar" id="detail-search-bar">
        <div class="detail-search-main">
          <svg class="search-icon" width="13" height="13" viewBox="0 0 16 16" fill="none">
            <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10 10l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input type="text" id="detail-search-input" placeholder="在会话中搜索..." autocomplete="off" />
          <span class="detail-search-count" id="detail-search-count"></span>
          <button class="dsearch-nav-btn" id="dsearch-prev" onclick="detailSearchNav(-1)" title="上一处" disabled>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M9 8L6 5 3 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="dsearch-nav-btn" id="dsearch-next" onclick="detailSearchNav(1)" title="下一处" disabled>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M3 4l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="dsearch-clear-btn" id="dsearch-clear" onclick="clearDetailSearch()">
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
              <path d="M9 3L3 9M3 3l6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <!-- Scope filter tabs for detail search -->
        <div class="detail-scope-tabs" id="detail-scope-tabs">
          <button class="detail-scope-tab active" data-scope="all" onclick="setDetailSearchScope('all')">全部</button>
          <button class="detail-scope-tab" data-scope="user" onclick="setDetailSearchScope('user')">提问</button>
          <button class="detail-scope-tab" data-scope="assistant" onclick="setDetailSearchScope('assistant')">回答</button>
        </div>
      </div>

      <div class="detail-messages" id="detail-messages">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>加载对话...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Theme Picker -->
  <div class="theme-overlay" id="theme-overlay" onclick="closeThemePicker()"></div>
  <div class="theme-picker" id="theme-picker">
    <div class="theme-picker-header">
      <span class="theme-picker-title">选择主题</span>
      <button class="icon-btn" onclick="closeThemePicker()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M11 3L3 11M3 3l8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="theme-list" id="theme-list"></div>
  </div>

  <!-- Sync Panel -->
  <div class="sync-overlay" id="sync-overlay" onclick="closeSyncPanel()"></div>
  <div class="sync-panel" id="sync-panel">
    <div class="sync-panel-header">
      <div class="sync-panel-title">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M13.5 2.5v3.5H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2.5 13.5V10H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13.5 6A6 6 0 0 0 4.1 3.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M2.5 10a6 6 0 0 0 9.4 2.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        云端同步
      </div>
      <button class="icon-btn" onclick="closeSyncPanel()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M11 3L3 11M3 3l8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- 设置区 -->
    <div class="sync-section">
      <div class="sync-section-title">服务器配置</div>
      <div class="sync-form">
        <label class="sync-label">服务器地址</label>
        <input class="sync-input" id="sync-server-url" type="text"
          placeholder="http://localhost:3456" autocomplete="off"/>

        <label class="sync-label">API Token</label>
        <input class="sync-input" id="sync-api-token" type="password"
          placeholder="your-secret-token" autocomplete="off"/>

        <label class="sync-label">设备名称</label>
        <input class="sync-input" id="sync-device-name" type="text"
          placeholder="我的 MacBook" autocomplete="off"/>

        <div class="sync-device-id-row">
          <span class="sync-label">设备 ID</span>
          <span class="sync-device-id" id="sync-device-id">—</span>
        </div>
      </div>
      <div class="sync-actions">
        <button class="sync-btn sync-btn-secondary" id="sync-test-btn" onclick="syncTestConnection()">
          测试连接
        </button>
        <button class="sync-btn sync-btn-primary" onclick="syncSaveConfig()">
          保存配置
        </button>
      </div>
      <div class="sync-test-result" id="sync-test-result"></div>
    </div>

    <!-- 同步操作区 -->
    <div class="sync-section">
      <div class="sync-section-title">同步操作</div>
      <div class="sync-stat-row" id="sync-stat-row">
        <div class="sync-stat">
          <div class="sync-stat-num" id="sync-local-count">—</div>
          <div class="sync-stat-label">本地会话</div>
        </div>
        <div class="sync-stat-arrow">→</div>
        <div class="sync-stat">
          <div class="sync-stat-num" id="sync-server-count">—</div>
          <div class="sync-stat-label">服务端会话</div>
        </div>
        <div class="sync-stat-arrow">←</div>
        <div class="sync-stat">
          <div class="sync-stat-num" id="sync-pending-count">—</div>
          <div class="sync-stat-label">待同步</div>
        </div>
      </div>
      <div class="sync-progress-wrap" id="sync-progress-wrap" style="display:none">
        <div class="sync-progress-bar">
          <div class="sync-progress-fill" id="sync-progress-fill"></div>
        </div>
        <div class="sync-progress-text" id="sync-progress-text">准备中...</div>
      </div>
      <div class="sync-actions">
        <button class="sync-btn sync-btn-secondary" id="sync-check-btn" onclick="syncCheck()">
          检查差异
        </button>
        <button class="sync-btn sync-btn-primary" id="sync-upload-btn" onclick="syncUpload()">
          ↑ 上传到服务端
        </button>
        <button class="sync-btn sync-btn-success" id="sync-download-btn" onclick="syncDownload()">
          ↓ 下载到本地
        </button>
      </div>
      <div class="sync-last-time" id="sync-last-time"></div>
    </div>

    <!-- 自动化任务同步区 -->
    <div class="sync-section">
      <div class="sync-section-title">
        <span style="display:flex;align-items:center;gap:6px;">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <rect x="1" y="2" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
            <path d="M4 5h4M4 7h2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          自动化任务
        </span>
        <span class="sync-auto-badge" id="sync-auto-badge" style="display:none"></span>
      </div>
      <div class="sync-stat-row" style="margin-bottom:10px;">
        <div class="sync-stat">
          <div class="sync-stat-num" id="sync-auto-local-count">—</div>
          <div class="sync-stat-label">本地文件</div>
        </div>
        <div class="sync-stat-arrow">⇄</div>
        <div class="sync-stat">
          <div class="sync-stat-num" id="sync-auto-upload-count">—</div>
          <div class="sync-stat-label">待上传</div>
        </div>
        <div class="sync-stat-arrow">⇄</div>
        <div class="sync-stat">
          <div class="sync-stat-num" id="sync-auto-download-count">—</div>
          <div class="sync-stat-label">可下载</div>
        </div>
      </div>
      <div class="sync-progress-wrap" id="sync-auto-progress-wrap" style="display:none">
        <div class="sync-progress-bar">
          <div class="sync-progress-fill" id="sync-auto-progress-fill" style="background:linear-gradient(90deg,#10b981,#34d399)"></div>
        </div>
        <div class="sync-progress-text" id="sync-auto-progress-text">准备中...</div>
      </div>
      <div class="sync-actions">
        <button class="sync-btn sync-btn-secondary" id="sync-auto-check-btn" onclick="syncAutoCheck()">
          检查差异
        </button>
        <button class="sync-btn sync-btn-primary" id="sync-auto-upload-btn" onclick="syncAutoUpload()">
          ↑ 上传自动化
        </button>
        <button class="sync-btn sync-btn-success" id="sync-auto-download-btn" onclick="syncAutoDownload()">
          ↓ 下载自动化
        </button>
      </div>
      <div style="font-size:10px;color:var(--text-muted);margin-top:8px;line-height:1.5;">
        同步 <code style="font-size:10px;background:var(--bg-active);padding:1px 4px;border-radius:3px;">~/.codex/automations/</code> 目录中的自动化任务配置
      </div>
    </div>


    <!-- 管理线上数据 -->
    <div class="sync-section" id="sync-manage-section">
      <div class="sync-section-title" style="cursor:pointer;user-select:none;" onclick="toggleManagePanel()">
        <span style="display:flex;align-items:center;gap:6px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>
          </svg>
          管理线上数据
        </span>
        <span id="sync-manage-toggle" style="font-size:11px;color:var(--text-muted);">▶ 展开</span>
      </div>

      <div id="sync-manage-body" style="display:none;">
        <!-- 设备筛选 -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
          <label style="font-size:11px;color:var(--text-secondary);white-space:nowrap;">筛选设备：</label>
          <select id="sync-manage-device-filter" class="sync-input" style="flex:1;padding:4px 8px;font-size:11px;"
                  onchange="loadManageList()">
            <option value="">全部设备</option>
          </select>
          <button class="sync-btn sync-btn-secondary" style="padding:4px 10px;font-size:11px;"
                  onclick="loadManageList()">刷新</button>
        </div>

        <!-- 会话列表 -->
        <div style="margin-bottom:12px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <span style="font-size:11px;font-weight:600;color:var(--text-secondary);">
              线上会话
              <span id="sync-manage-session-count" style="color:var(--text-muted);font-weight:400;"></span>
            </span>
            <div style="display:flex;gap:6px;">
              <button class="sync-btn sync-btn-secondary" style="padding:2px 8px;font-size:10px;"
                      onclick="manageSelectAll('session')">全选</button>
              <button class="sync-btn sync-btn-secondary" style="padding:2px 8px;font-size:10px;"
                      onclick="manageSelectNone('session')">取消</button>
              <button class="sync-btn" style="padding:2px 8px;font-size:10px;background:rgba(248,113,113,0.12);color:#f87171;border:1px solid rgba(248,113,113,0.2);"
                      onclick="manageDeleteSelected('session')">删除所选</button>
            </div>
          </div>
          <div id="sync-manage-session-list" style="max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;">
            <div style="padding:16px;text-align:center;color:var(--text-muted);font-size:12px;">
              点击「展开」后自动加载
            </div>
          </div>
          <div id="sync-manage-session-pagination" style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;font-size:11px;color:var(--text-muted);"></div>
        </div>

        <!-- 自动化任务列表 -->
        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <span style="font-size:11px;font-weight:600;color:var(--text-secondary);">
              线上自动化任务
              <span id="sync-manage-auto-count" style="color:var(--text-muted);font-weight:400;"></span>
            </span>
            <div style="display:flex;gap:6px;">
              <button class="sync-btn sync-btn-secondary" style="padding:2px 8px;font-size:10px;"
                      onclick="manageSelectAll('auto')">全选</button>
              <button class="sync-btn sync-btn-secondary" style="padding:2px 8px;font-size:10px;"
                      onclick="manageSelectNone('auto')">取消</button>
              <button class="sync-btn" style="padding:2px 8px;font-size:10px;background:rgba(248,113,113,0.12);color:#f87171;border:1px solid rgba(248,113,113,0.2);"
                      onclick="manageDeleteSelected('auto')">删除所选</button>
            </div>
          </div>
          <div id="sync-manage-auto-list" style="max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;">
            <div style="padding:16px;text-align:center;color:var(--text-muted);font-size:12px;">
              点击「展开」后自动加载
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 同步日志 -->
    <div class="sync-section sync-log-section">
      <div class="sync-section-title">
        同步日志
        <button class="sync-log-clear" onclick="syncClearLog()">清空</button>
      </div>
      <div class="sync-log" id="sync-log">
        <div class="sync-log-empty">暂无同步记录</div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
