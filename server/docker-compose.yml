version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: codex_sync_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: codex
      POSTGRES_PASSWORD: codex123
      POSTGRES_DB: codex_sync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codex -d codex_sync"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 可选：adminer 数据库管理界面
  adminer:
    image: adminer:latest
    container_name: codex_sync_adminer
    restart: unless-stopped
    ports:
      - "8181:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
