name: Release

on:
  push:
    tags:
      - 'v*'           # 推送 v1.0.0 这样的 tag 时触发
  workflow_dispatch:   # 也支持手动触发

permissions:
  contents: write      # 需要写权限来创建 Release

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'   # Apple Silicon
            label: 'macOS-arm64'
            rust_targets: 'aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'    # Intel Mac
            label: 'macOS-x64'
            rust_targets: 'x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
            label: 'Windows'
            rust_targets: ''
          - platform: ubuntu-22.04
            args: ''
            label: 'Linux'
            rust_targets: ''

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 从 tag 同步版本号到三处配置文件 ──────────────────────────────────
      # 保证安装包文件名（来自 tauri.conf.json）与 GitHub Release tag 一致
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"

          # 1. tauri.conf.json → 控制安装包文件名
          jq --arg v "$VERSION" '.version = $v' \
            src-tauri/tauri.conf.json > _tmp.json \
            && mv _tmp.json src-tauri/tauri.conf.json

          # 2. package.json
          jq --arg v "$VERSION" '.version = $v' \
            package.json > _tmp.json \
            && mv _tmp.json package.json

          # 3. Cargo.toml — python3 -c 直接把 $VERSION 展开进去
          #    只替换 [package] 块首个 version 行，不动 [dependencies] 里的版本号
          python3 -c "
          import re
          path = 'src-tauri/Cargo.toml'
          version = '${VERSION}'
          text = open(path).read()
          text = re.sub(r'^version = \".*?\"', 'version = \"' + version + '\"', text, count=1, flags=re.MULTILINE)
          open(path, 'w').write(text)
          "

          echo "=== 验证 ==="
          grep '"version"' src-tauri/tauri.conf.json
          grep '"version"' package.json
          grep '^version' src-tauri/Cargo.toml | head -1

      # Linux 系统依赖
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Codex History Viewer ${{ github.ref_name }}'
          releaseBody: |
            ## Codex History Viewer ${{ github.ref_name }}

            ### 新功能（v1.3.0）
            - 🤖 **自动化任务同步**：将 `~/.codex/automations/` 目录中的自动化任务配置跨设备同步，在同步面板「自动化任务」区块操作

            ### 修复（v1.3.1）
            - 🔧 修复 Windows 上「待上传」始终显示 0 的问题
              - 目录不存在时在同步日志显示实际扫描路径，而非静默返回空
              - Windows 文件 mtime 获取异常时兜底用当前时间，确保正确触发上传
              - 单文件读取失败时跳过该文件，不影响其他文件
            - 🔧 修复安装包文件名版本号与 Release tag 不一致的问题（CI 自动同步版本）

            ### Agy 会话导入
            - 支持从 JSON、JSONL、TXT、Markdown 导入 Agy 会话到 Codex 历史
            - 提供无界面的 `codex-history-cli` 命令行工具，适用于服务器和纯终端环境
            - Linux x64 CLI 使用 musl 静态构建；所有 CLI 产物都不依赖 GTK/WebKit 桌面运行库

            ### 下载说明
            - **macOS (Apple Silicon)**: 下载 `*_aarch64.dmg`
            - **macOS (Intel)**: 下载 `*_x64.dmg`
            - **Windows**: 下载 `*_x64-setup.exe` 或 `*_x64_en-US.msi`
            - **Linux**: 下载 `*.AppImage` 或 `*.deb`
            - **纯终端 CLI**: 下载对应平台的 `codex-history-cli-*` 文件：
              - `codex-history-cli-macOS-arm64`
              - `codex-history-cli-macOS-x64`
              - `codex-history-cli-Windows-x64.exe`
              - `codex-history-cli-Linux-x64`
              - `codex-history-cli-Linux-arm64`

            ### 使用说明
            需要先安装并运行一次 Codex，使其创建 `~/.codex/state_5.sqlite`。纯终端环境不需要安装 Codex Desktop。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  build-headless-cli:
    needs: build-tauri
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: 'macOS-arm64'
            cli_target: 'aarch64-apple-darwin'
            cli_ext: ''
          - platform: macos-latest
            label: 'macOS-x64'
            cli_target: 'x86_64-apple-darwin'
            cli_ext: ''
          - platform: windows-latest
            label: 'Windows-x64'
            cli_target: 'x86_64-pc-windows-msvc'
            cli_ext: '.exe'
          - platform: ubuntu-22.04
            label: 'Linux-x64'
            cli_target: 'x86_64-unknown-linux-musl'
            cli_ext: ''
          - platform: ubuntu-24.04-arm
            label: 'Linux-arm64'
            cli_target: 'aarch64-unknown-linux-gnu'
            cli_ext: ''

    runs-on: ${{ matrix.platform }}
    name: Build headless CLI (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install musl tools
        if: startsWith(matrix.cli_target, 'x86_64-unknown-linux-musl') || startsWith(matrix.cli_target, 'aarch64-unknown-linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cli_target }}

      - name: Build headless CLI
        shell: bash
        run: |
          if [[ "${{ matrix.cli_target }}" == "x86_64-pc-windows-msvc" ]]; then
            export RUSTFLAGS="-C target-feature=+crt-static"
          fi

          cargo build \
            --manifest-path cli/Cargo.toml \
            --release \
            --target "${{ matrix.cli_target }}"

          SOURCE="cli/target/${{ matrix.cli_target }}/release/codex-history-cli${{ matrix.cli_ext }}"
          OUTPUT="codex-history-cli-${{ matrix.label }}${{ matrix.cli_ext }}"
          cp "$SOURCE" "$OUTPUT"
          echo "CLI_ASSET=$OUTPUT" >> "$GITHUB_ENV"

      - name: Upload headless CLI
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" "${CLI_ASSET}" --clobber

  upload-release-extras:
    needs: build-headless-cli
    runs-on: ubuntu-22.04
    name: Upload release extras

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload GUI stable aliases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          upload_alias() {
            local pattern="$1"
            local alias="$2"
            local tmp
            tmp="$(mktemp -d)"
            if gh release download "${GITHUB_REF_NAME}" --pattern "$pattern" --dir "$tmp" --clobber; then
              local source
              source="$(find "$tmp" -maxdepth 1 -type f -name "$pattern" -print -quit)"
              if [ -n "$source" ]; then
                cp "$source" "$alias"
                gh release upload "${GITHUB_REF_NAME}" "$alias" --clobber
              else
                echo "warning: no asset matched $pattern" >&2
              fi
            else
              echo "warning: failed to download asset for pattern $pattern" >&2
            fi
            rm -rf "$tmp"
          }

          upload_alias 'Codex.History.Viewer_*_aarch64.dmg' 'codex-history-viewer-macOS-arm64.dmg'
          upload_alias 'Codex.History.Viewer_*_x64.dmg' 'codex-history-viewer-macOS-x64.dmg'
          upload_alias 'Codex.History.Viewer_*_x64-setup.exe' 'codex-history-viewer-Windows-x64-setup.exe'
          upload_alias 'Codex.History.Viewer_*_x64_en-US.msi' 'codex-history-viewer-Windows-x64.msi'
          upload_alias 'Codex.History.Viewer_*_amd64.AppImage' 'codex-history-viewer-Linux-x64.AppImage'
          upload_alias 'Codex.History.Viewer_*_amd64.deb' 'codex-history-viewer-Linux-x64.deb'
          upload_alias 'Codex.History.Viewer-*-1.x86_64.rpm' 'codex-history-viewer-Linux-x64.rpm'

      - name: Upload install scripts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            scripts/install-gui.sh \
            scripts/install-gui.ps1 \
            scripts/install-cli.sh \
            scripts/install-cli.ps1 \
            --clobber

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --prerelease=false
