name: Release

on:
  push:
    tags:
      - 'v*'           # 推送 v1.0.0 这样的 tag 时触发
  workflow_dispatch:   # 也支持手动触发

permissions:
  contents: write      # 需要写权限来创建 Release

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'   # Apple Silicon
            label: 'macOS-arm64'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'    # Intel Mac
            label: 'macOS-x64'
          - platform: windows-latest
            args: ''
            label: 'Windows'
          - platform: ubuntu-22.04
            args: ''
            label: 'Linux'

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 从 tag 同步版本号到三处配置文件 ──────────────────────────────────
      # 保证安装包文件名（来自 tauri.conf.json）与 GitHub Release tag 一致
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"

          # 1. tauri.conf.json → 控制安装包文件名
          jq --arg v "$VERSION" '.version = $v' \
            src-tauri/tauri.conf.json > _tmp.json \
            && mv _tmp.json src-tauri/tauri.conf.json

          # 2. package.json
          jq --arg v "$VERSION" '.version = $v' \
            package.json > _tmp.json \
            && mv _tmp.json package.json

          # 3. Cargo.toml — python3 -c 直接把 $VERSION 展开进去
          #    只替换 [package] 块首个 version 行，不动 [dependencies] 里的版本号
          python3 -c "
          import re
          path = 'src-tauri/Cargo.toml'
          version = '${VERSION}'
          text = open(path).read()
          text = re.sub(r'^version = \".*?\"', 'version = \"' + version + '\"', text, count=1, flags=re.MULTILINE)
          open(path, 'w').write(text)
          "

          echo "=== 验证 ==="
          grep '"version"' src-tauri/tauri.conf.json
          grep '"version"' package.json
          grep '^version' src-tauri/Cargo.toml | head -1

      # Linux 系统依赖
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Codex History Viewer ${{ github.ref_name }}'
          releaseBody: |
            ## Codex History Viewer ${{ github.ref_name }}

            ### 新功能（v1.3.0）
            - 🤖 **自动化任务同步**：将 `~/.codex/automations/` 目录中的自动化任务配置跨设备同步，在同步面板「自动化任务」区块操作

            ### 修复（v1.3.1）
            - 🔧 修复 Windows 上「待上传」始终显示 0 的问题
              - 目录不存在时在同步日志显示实际扫描路径，而非静默返回空
              - Windows 文件 mtime 获取异常时兜底用当前时间，确保正确触发上传
              - 单文件读取失败时跳过该文件，不影响其他文件
            - 🔧 修复安装包文件名版本号与 Release tag 不一致的问题（CI 自动同步版本）

            ### 下载说明
            - **macOS (Apple Silicon)**: 下载 `*_aarch64.dmg`
            - **macOS (Intel)**: 下载 `*_x64.dmg`
            - **Windows**: 下载 `*_x64-setup.exe` 或 `*_x64_en-US.msi`
            - **Linux**: 下载 `*.AppImage` 或 `*.deb`

            ### 使用说明
            需要先安装 [Codex Desktop](https://openai.com/codex)，本工具读取 `~/.codex/` 下的本地数据。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
